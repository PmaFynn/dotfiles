set -a terminal-features "tmux-256color:RGB"
set -g prefix C-z
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-interval 5
set -g status-right '#{?client_prefix, _ ,}#(timew | awk "/^ *Total/ {print \$NF}") #[bg=green,fg=black,bold]#(timew | awk "/^ *Tracking/ {print \" \" \$NF \" \"}")#[bg=default]'
set -g status-left "#S"

bind r source-file "~/.config/tmux/tmux.conf"
bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
# TODO: fix this sometime
bind g run "~/.config/scripts/open-github.sh"
bind t run "tmux neww ~/.config/scripts/time.sh"
bind N run "~/.config/scripts/tmux-session-dispensary.sh ~/projects/writing/neoliberalism"
bind W run "~/.config/scripts/tmux-session-dispensary.sh ~/projects/writing"
bind P run "~/.config/scripts/tmux-session-dispensary.sh ~/projects"
bind D run "~/.config/scripts/tmux-session-dispensary.sh ~/.config"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

